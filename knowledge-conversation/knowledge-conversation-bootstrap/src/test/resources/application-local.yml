server:
  port: 30002

spring:
  config:
    import: optional:file:.env[.properties]
  threads:
    virtual:
      enabled: true
  http:
    client:
      factory: http_components
      connect-timeout: 3s
      read-timeout: 30m
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_rag?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ENC(WD9bUuR6iDcBj8ZrXF22aYNuJ+nZKCrQs4wGo/mNXEqPg+Rawnoe9/HQCqeV8L7s)
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  redis:
    redisson:
      config: |
        singleServerConfig:
          idleConnectionTimeout: 10000
          connectTimeout: 10000
          timeout: 3000
          retryAttempts: 4
          retryDelay: !<org.redisson.config.EqualJitterDelay> {baseDelay: PT1S, maxDelay: PT2S}
          reconnectionDelay: !<org.redisson.config.EqualJitterDelay> {baseDelay: PT0.1S, maxDelay: PT10S}
          subscriptionsPerConnection: 5
          clientName: null
          address: "redis://127.0.0.1:6379"
          subscriptionConnectionMinimumIdleSize: 1
          subscriptionConnectionPoolSize: 50
          connectionMinimumIdleSize: 24
          connectionPoolSize: 64
          database: 0
          dnsMonitoringInterval: 5000
        password: a2882131
        username: null
        threads: 16
        nettyThreads: 32
        codec: !<org.redisson.codec.Kryo5Codec> {}
        transportMode: "NIO"


mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: ai.neuron.copilot.knowledge.rag.adapter.out.rdb.mybatis.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
    jdbc-type-for-null: null
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: INFO
    ai.neuron.copilot.knowledge: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.mybatis: DEBUG
    org.mybatis.spring: DEBUG

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    key-obtention-iterations: 1000
    pool-size: 4
    string-output-type: base64